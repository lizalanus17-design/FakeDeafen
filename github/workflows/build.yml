name: Build FakeDeafen

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Clone Aliucord plugin template
        run: |
          git clone --depth=1 \
            https://github.com/Aliucord/AliucordNative \
            template

      - name: Copy plugin into template
        run: |
          mkdir -p template/plugins/FakeDeafen
          cp -r plugin/src          template/plugins/FakeDeafen/
          cp    plugin/build.gradle template/plugins/FakeDeafen/

      - name: Register plugin in settings.gradle
        run: echo 'include ":plugins:FakeDeafen"' >> template/settings.gradle

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('template/**/*.gradle*') }}

      - name: Build plugin
        working-directory: template
        run: ./gradlew :plugins:FakeDeafen:make --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FakeDeafen
          path: template/plugins/FakeDeafen/build/outputs/FakeDeafen.zip
          if-no-files-found: error
