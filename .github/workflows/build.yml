name: Build FakeDeafen
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - name: Clone plugins-template
        run: git clone --depth=1 https://github.com/Aliucord/plugins-template template

      - name: Copy plugin
        run: |
          cp -r plugin/src template/plugin/
          cp plugin/build.gradle.kts template/plugin/

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        working-directory: template
        run: ./gradlew :plugin:make --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: FakeDeafen
          path: template/plugin/build/outputs/*.zip
          if-no-files-found: error
