name: Build FakeDeafen
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download deps
        run: |
          mkdir -p libs
          curl -L "https://maven.aliucord.com/snapshots/com/aliucord/discord-stubs/126021/discord-stubs-126021.jar" \
               -o libs/discord-stubs.jar
          curl -L "https://maven.aliucord.com/snapshots/com/aliucord/Aliucord/maven-metadata.xml" -o /tmp/ameta.xml
          AVER=$(grep -oP '(?<=<latest>)[^<]+' /tmp/ameta.xml)
          curl -L "https://maven.aliucord.com/snapshots/com/aliucord/Aliucord/$AVER/Aliucord-$AVER.jar" \
               -o libs/aliucord.jar

      - name: Compile
        run: |
          mkdir -p build/classes
          javac -source 11 -target 11 \
            -cp "libs/discord-stubs.jar:libs/aliucord.jar" \
            -d build/classes \
            src/main/java/com/aliucord/plugins/FakeDeafen.java

      - name: Create manifest
        run: |
          cat > build/manifest.json << 'EOF'
          {"name":"FakeDeafen","version":"1.0.0","description":"Fake deafen/mute","authors":[{"name":"You","id":0}],"pluginClassName":"com.aliucord.plugins.FakeDeafen"}
          EOF

      - name: Package
        run: |
          cd build/classes && jar cf ../classes.jar . && cd ../..
          BTVER=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BTVER/d8 --output build/ build/classes.jar
          cd build && zip FakeDeafen.zip classes.dex manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: FakeDeafen
          path: build/FakeDeafen.zip
          if-no-files-found: error
